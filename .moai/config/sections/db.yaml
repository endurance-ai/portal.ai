# Database Documentation Configuration
# Controls /moai database workflow, auto-sync hook, and schema documentation policy.
#
# Structure: 8 keys directly under `database:` (REQ-010)
#   - 5 system-fixed keys: enabled, dir, auto_sync, migration_patterns, engine
#   - 3 interview-input keys: orm, multi_tenant, migration_tool (filled by `/moai database init`)

db:
  # [System] Enabled when /moai database init has run. Default false until user opts in.
  enabled: false

  # [System] Documentation folder (relative to project root)
  dir: ".moai/project/database"

  # [System] Automatic schema sync on migration file changes
  auto_sync:
    enabled: true
    debounce_seconds: 10
    require_user_approval: true
    excluded_patterns:
      - ".moai/project/database/**"
      - ".moai/cache/**"
      - "**/*.lock"

  # [System] Migration file detection globs (PostToolUse matcher references these)
  migration_patterns:
    - "prisma/schema.prisma"
    - "alembic/versions/**/*.py"
    - "database/migrate/**/*.rb"
    - "migrations/**/*.sql"
    - "database/migrations/**/*.sql"
    - "sql/migrations/**/*.sql"

  # [System] Primary database engine (set during /moai database init interview)
  engine: "_TBD_"

  # [Interview] ORM/ODM (set during /moai database init interview)
  orm: "_TBD_"

  # [Interview] Multi-tenant strategy (set during /moai database init interview)
  multi_tenant: "none"

  # [Interview] Migration tool (set during /moai database init interview)
  migration_tool: "_TBD_"
